# nginx/nginx.conf - Nginx 리버스 프록시 및 정적 파일 서빙 설정

upstream backend_api {
    server 127.0.0.1:3001;
}

upstream go2rtc_api {
    server 127.0.0.1:1984;
}

server {
    listen 80;
    server_name _;

    # React 빌드 파일 서빙
    root /var/www/cctv-dashboard/client/build;
    index index.html;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # 백엔드 API 프록시 (인증, 카메라 관리)
    location /api/auth {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/cameras {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # go2rtc API 프록시 (스트림 관련)
    location /api/stream {
        proxy_pass http://go2rtc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/streams {
        proxy_pass http://go2rtc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # go2rtc WebRTC 시그널링 프록시
    location /api/webrtc {
        proxy_pass http://go2rtc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # go2rtc HLS 스트림 프록시
    location /api/hls {
        proxy_pass http://go2rtc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # go2rtc 웹소켓 프록시
    location /api/ws {
        proxy_pass http://go2rtc_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # go2rtc 웹 인터페이스 프록시
    location /go2rtc {
        proxy_pass http://go2rtc_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React SPA 라우팅 (모든 나머지 경로 → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
