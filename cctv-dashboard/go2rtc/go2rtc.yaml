# go2rtc/go2rtc.yaml - go2rtc 스트리밍 서버 설정

# API 설정
api:
  listen: ":1984"
  origin: "*"

# WebRTC 설정 (내부망 전용)
webrtc:
  listen: ":8555"
  ice_servers: []
  candidates:
    - stun:0.0.0.0:8555

# 스트림 설정 - 카메라 20대 RTSP 주소 등록
# 실제 운영 시 아래 RTSP 주소를 실제 카메라 주소로 변경
streams:
  cam_1:
